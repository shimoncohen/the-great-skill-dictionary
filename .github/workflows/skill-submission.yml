# Filename stays skill-submission.yml: regenerate-submissions.yml dispatches
# this workflow by filename.
name: Submission
# Handles both skill submissions (label: skill-submission) and collection/
# registry submissions (label: collection-submission). The kind is derived
# from the issue's labels and picks the script command and branch prefix.
on:
  issues:
    types: [opened, labeled]
  # Regeneration path: re-run generation for an existing submission issue
  # (dispatched by regenerate-submissions.yml after main changes). Skips the
  # duplicate guard — updating the existing branch/PR is the point.
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number of the submission to (re)generate
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-skill:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.issue.labels.*.name, 'skill-submission') || contains(github.event.issue.labels.*.name, 'collection-submission')
    runs-on: ubuntu-latest
    # Per-issue group dedupes the opened+labeled event pair. Do NOT try to
    # serialize submissions with a single global group: GitHub keeps at most
    # ONE queued run per group and cancels the rest, so N>2 concurrent
    # submissions lose runs (observed live). Cross-submission merge races are
    # handled by the retry loop in the auto-merge step instead.
    concurrency:
      group: skill-submission-${{ github.event.issue.number || inputs.issue_number }}
      cancel-in-progress: true
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      ISSUE: ${{ github.event.issue.number || inputs.issue_number }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # SECURITY: the issue body is untrusted input. It is written to a file by
      # jq (never shell-interpolated) and only ever parsed by dictionary.py —
      # never eval'd. The resulting PR requires maintainer review before merge.
      - name: Resolve issue
        id: issue
        run: |
          data=$(gh api "repos/$REPO/issues/$ISSUE")
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            jq -e 'any(.labels[]; .name == "skill-submission" or .name == "collection-submission")' <<<"$data" >/dev/null \
              || { echo "issue #$ISSUE is not a skill or collection submission"; exit 1; }
            jq -e '.state == "open"' <<<"$data" >/dev/null \
              || { echo "issue #$ISSUE is closed"; exit 1; }
          fi
          kind=$(jq -r 'if any(.labels[]; .name == "collection-submission") then "collection" else "skill" end' <<<"$data")
          jq -r '.body // ""' <<<"$data" > /tmp/issue-body.md
          {
            echo "login=$(jq -r .user.login <<<"$data")"
            echo "uid=$(jq -r .user.id <<<"$data")"
            echo "kind=$kind"
            echo "branch=${kind}-submission/issue-$ISSUE"
          } >> "$GITHUB_OUTPUT"

      # Guard: never override an existing submission branch or open PR for this
      # issue on label events. Deliberate regeneration (dispatch) skips this.
      - name: Check for existing submission branch or PR
        id: guard
        if: github.event_name == 'issues'
        env:
          BRANCH: ${{ steps.issue.outputs.branch }}
        run: |
          exists=false
          pr_url=$(gh pr list --repo "$REPO" --head "$BRANCH" --state open --json url --jq '.[0].url' || true)
          if [ -n "$pr_url" ] || git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            exists=true
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Comment when submission already in progress
        if: steps.guard.outputs.exists == 'true'
        env:
          PR_URL: ${{ steps.guard.outputs.pr_url }}
          BRANCH: ${{ steps.issue.outputs.branch }}
        run: |
          if [ -n "$PR_URL" ]; then
            gh issue comment "$ISSUE" --repo "$REPO" --body "A submission PR already exists for this issue: $PR_URL. Not overriding it. Close that PR first if you want automation to regenerate."
          else
            gh issue comment "$ISSUE" --repo "$REPO" --body "A submission branch already exists for this issue. Not overriding it. Delete the branch \`$BRANCH\` first if you want automation to regenerate."
          fi

      - name: Run tests
        if: steps.guard.outputs.exists != 'true'
        run: python3 -m unittest tests.test_dictionary

      - name: Add row
        if: steps.guard.outputs.exists != 'true'
        id: add
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIND: ${{ steps.issue.outputs.kind }}
        run: |
          if [ "$KIND" = "collection" ]; then
            python3 scripts/dictionary.py add-collection --issue-body /tmp/issue-body.md
          else
            python3 scripts/dictionary.py add --issue-body /tmp/issue-body.md --date "$(date -u +%Y-%m)"
          fi

      # SUBMISSION_PAT (fine-grained, this repo only) instead of GITHUB_TOKEN:
      # PRs authored via the PAT trigger CI normally (required for the merge
      # queue) and avoid the GITHUB_TOKEN suppression quirks (checks parked
      # as action_required, Closes #N not firing, regenerate not dispatching).
      - name: Create or update pull request
        if: steps.guard.outputs.exists != 'true'
        id: pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ secrets.SUBMISSION_PAT }}
          branch: ${{ steps.issue.outputs.branch }}
          assignees: ${{ steps.issue.outputs.login }}
          # Conventional-commit title: GitHub's default squash subject is the
          # PR title, so maintainer-merged PRs stay commitlint-clean too.
          title: "feat: add ${{ steps.issue.outputs.kind }} ${{ steps.add.outputs.name }}"
          author: ${{ steps.issue.outputs.login }} <${{ steps.issue.outputs.uid }}+${{ steps.issue.outputs.login }}@users.noreply.github.com>
          commit-message: |
            feat: add ${{ steps.issue.outputs.kind }} ${{ steps.add.outputs.name }}

            Generated from issue #${{ env.ISSUE }}.

            Co-authored-by: ${{ steps.issue.outputs.login }} <${{ steps.issue.outputs.uid }}+${{ steps.issue.outputs.login }}@users.noreply.github.com>
          body: |
            Automated ${{ steps.issue.outputs.kind }} row for #${{ env.ISSUE }}.
            Inferred fields (license; for skills also name, description, token costs). Review before merging.

            Closes #${{ env.ISSUE }}
          add-paths: |
            README.md
            .github/skill-sources.json

      # Trust gate: `automerge` is computed by dictionary.py (collection
      # submissions only) — stars come from the GitHub API, and the free-text
      # description must be plain prose. Fresh PRs only: regenerated PRs
      # ('updated') keep whatever review state they had.
      # --auto arms GitHub native auto-merge (merge queue is org-only): the
      # PR merges as soon as required checks pass, and GitHub re-evaluates
      # mergeability itself when main moves — no retry loop. Uses the PAT so
      # the resulting push triggers workflows (e.g. regenerate-submissions).
      - name: Arm auto-merge for popular collection
        if: steps.pr.outputs.pull-request-operation == 'created' && steps.add.outputs.automerge == 'true'
        env:
          GH_TOKEN: ${{ secrets.SUBMISSION_PAT }}
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
          PR_NUMBER: ${{ steps.pr.outputs.pull-request-number }}
          STARS: ${{ steps.add.outputs.stars }}
          KIND: ${{ steps.issue.outputs.kind }}
          NAME: ${{ steps.add.outputs.name }}
        run: |
          gh pr merge "$PR_URL" --repo "$REPO" --auto --squash \
            --subject "feat: add $KIND $NAME (#$PR_NUMBER)" \
            --body "Generated from issue #$ISSUE; auto-merged at $STARS stars. Closes #$ISSUE"
          gh issue comment "$ISSUE" --repo "$REPO" --body "Auto-merge armed for $PR_URL — repository has $STARS stars (threshold: 1000). GitHub lands it once CI passes."

      - name: Comment on issue
        if: steps.pr.outputs.pull-request-operation == 'created' && steps.add.outputs.automerge != 'true'
        env:
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
        run: gh issue comment "$ISSUE" --repo "$REPO" --body "Automation opened $PR_URL — a maintainer will review it."

      - name: Comment on failure
        if: failure()
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue comment "$ISSUE" --repo "$REPO" --body "Automation could not process this submission (bad URL, missing frontmatter, duplicate entry, invalid field, or an auto-merge conflict are the usual causes). A maintainer will take a look. [Run log]($RUN_URL)"
