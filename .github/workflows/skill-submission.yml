name: Skill submission
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  add-skill:
    if: contains(github.event.issue.labels.*.name, 'skill-submission')
    runs-on: ubuntu-latest
    concurrency:
      group: skill-submission-${{ github.event.issue.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Guard: never override an existing submission branch or open PR for this issue.
      - name: Check for existing submission branch or PR
        id: guard
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: skill-submission/issue-${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          exists=false
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            exists=true
          fi
          pr_url=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO/pulls?head=${REPO%%/*}:$BRANCH&state=open" \
            | python3 -c "import json,sys; d=json.load(sys.stdin); print(d[0]['html_url'] if d else '')")
          if [ -n "$pr_url" ]; then
            exists=true
          fi
          echo "exists=$exists" >> "$GITHUB_OUTPUT"
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"

      - name: Comment when submission already in progress
        if: steps.guard.outputs.exists == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PR_URL: ${{ steps.guard.outputs.pr_url }}
        with:
          script: |
            const pr = process.env.PR_URL;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: pr
                ? `A submission PR already exists for this issue: ${pr}. Not overriding it. Close that PR first if you want automation to regenerate.`
                : `A submission branch already exists for this issue. Not overriding it. Delete the branch \`skill-submission/issue-${context.issue.number}\` first if you want automation to regenerate.`,
            })

      # SECURITY: issue body is untrusted input. It is passed via env (not shell
      # interpolation) and only ever parsed by skill_row.py — never eval'd.
      # The resulting PR requires maintainer review before merge.
      - name: Save issue body
        if: steps.guard.outputs.exists == 'false'
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: printf '%s' "$ISSUE_BODY" > /tmp/issue-body.md

      - name: Run tests
        if: steps.guard.outputs.exists == 'false'
        run: python3 -m unittest tests.test_skill_row

      - name: Add skill row
        if: steps.guard.outputs.exists == 'false'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/skill_row.py add --issue-body /tmp/issue-body.md --date "$(date -u +%Y-%m)"

      - name: Create pull request
        if: steps.guard.outputs.exists == 'false'
        id: pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          branch: skill-submission/issue-${{ github.event.issue.number }}
          title: "Add skill from #${{ github.event.issue.number }}"
          commit-message: |
            Add skill from issue #${{ github.event.issue.number }}
          body: |
            Automated skill row for #${{ github.event.issue.number }}.
            Inferred: name, description, license, token costs. Review before merging.

            Closes #${{ github.event.issue.number }}
          add-paths: |
            README.md
            .github/skill-sources.json

      - name: Comment on issue
        if: steps.pr.outputs.pull-request-url
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PR_URL: ${{ steps.pr.outputs.pull-request-url }}
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Automation opened ${process.env.PR_URL} — a maintainer will review it.`,
            })

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Automation could not process this submission (bad URL, missing frontmatter, duplicate skill, or invalid field are the usual causes). A maintainer will take a look. [Run log](${process.env.RUN_URL})`,
            })
