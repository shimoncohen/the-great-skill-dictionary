name: Monthly cost re-measure
on:
  schedule:
    - cron: "17 4 1 * *"   # 04:17 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  remeasure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tests
        run: python3 -m unittest tests.test_dictionary

      - name: Re-measure token costs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/dictionary.py remeasure --date "$(date -u +%Y-%m)"

      - name: Create pull request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          # PAT so CI triggers on the PR (required check for the main ruleset)
          token: ${{ secrets.SUBMISSION_PAT }}
          branch: cost-remeasure
          title: "chore: monthly token-cost re-measure"
          commit-message: "chore: re-measure skill token costs"
          body: |
            Automated monthly refresh of token counts for skills recorded in
            `.github/skill-sources.json`. Review before merging.
          add-paths: README.md
