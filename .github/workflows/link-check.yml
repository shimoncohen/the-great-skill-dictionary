name: Link check
# Catches dead skill/collection repos (the main rot mode for curated lists)
# and category TOC drift. `dictionary.py check` verifies every external link
# in README.md, every local link target, and that each category has both a
# heading and a TOC entry.
on:
  schedule:
    - cron: "41 5 * * 1"   # 05:41 UTC every Monday
  workflow_dispatch:
  pull_request:
    paths: [README.md]
  push:
    branches: [main]
    paths: [README.md]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run tests
        run: python3 -m unittest tests.test_dictionary

      - name: Check README links and TOC
        run: python3 scripts/dictionary.py check
