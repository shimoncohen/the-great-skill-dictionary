name: Regenerate submission PRs
# When main changes (a submission was merged), open skill-submission PRs go
# stale and can conflict. Their content is fully derived from the issue, so
# re-dispatch the submission workflow for each one; it rebuilds the branch
# from the new main and force-pushes. All generation logic lives there.
on:
  push:
    branches: [main]
    paths:
      - README.md
      - .github/skill-sources.json

permissions:
  actions: write
  pull-requests: read

concurrency:
  group: regenerate-submissions
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Dispatch regeneration for open submission PRs
        run: |
          gh pr list --repo "$REPO" --state open --json headRefName \
            --jq '.[].headRefName | select(test("^(skill|collection)-submission/issue-[0-9]+$")) | sub("^(skill|collection)-submission/issue-"; "")' |
          while read -r issue; do
            echo "dispatching regeneration for issue #$issue"
            gh workflow run skill-submission.yml --repo "$REPO" -f issue_number="$issue"
          done
